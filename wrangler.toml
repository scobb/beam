name = "beam"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

routes = [
  { pattern = "beam.keylightdigital.dev/*", zone_name = "keylightdigital.dev" }
]

# Note: beam-privacy.com and www.beam-privacy.com are configured as Worker Custom Domains
# via the Cloudflare API (not routes) — they appear in the Cloudflare dashboard under
# Workers > beam > Custom Domains and do not require zone-level write permission.

[[d1_databases]]
binding = "DB"
database_name = "beam-db"
database_id = "62c68903-0c63-447d-9236-c1221c1aa575"
migrations_dir = "migrations"

[[kv_namespaces]]
binding = "KV"
id = "eda926e0122f42daaec2772b2d552d04"

[triggers]
crons = ["0 9 * * *", "0 9 * * 1"]

[vars]
ENVIRONMENT = "production"
BEAM_SELF_SITE_ID = "dfa32f6b-0775-43df-a2c4-eb23787e5f03"
# STRIPE_ANNUAL_PRICE_ID must be set as a Worker secret:
#   echo "price_XXXX" | wrangler secret put STRIPE_ANNUAL_PRICE_ID
# Test price: price_1TNc2HRhEblTFzoxO4TpFpEM (live price to be created by Steve)

[env.staging]
name = "beam-staging"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "beam-db-staging"
database_id = "121c2d4a-89ad-4237-94e0-43810eb51f76"
migrations_dir = "migrations"

[[env.staging.kv_namespaces]]
binding = "KV"
id = "fc6960cc89ae497fb6040bdb55704f46"

[env.staging.vars]
ENVIRONMENT = "staging"
