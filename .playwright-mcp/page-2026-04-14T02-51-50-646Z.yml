  - generic [ref=e14]:
    - heading "GET /api/v1/sites" [level=2] [ref=e15]
    - paragraph [ref=e16]: Returns all sites owned by the authenticated user.
    - code [ref=e18]: "curl -s https://beam-privacy.com/api/v1/sites \\ -H \"Authorization: Bearer beam_your_api_key_here\""
    - code [ref=e20]: "{ \"sites\": [ { \"id\": \"site_123\", \"domain\": \"example.com\", \"name\": \"Example\" } ] }"
  - generic [ref=e21]:
    - heading "GET /api/v1/sites/:id/stats?range=7d|30d|today" [level=2] [ref=e22]
    - paragraph [ref=e23]: Returns summary metrics and top traffic breakdowns for a site in the selected UTC range.
    - code [ref=e25]: "curl -s \"https://beam-privacy.com/api/v1/sites/site_123/stats?range=7d\" \\ -H \"Authorization: Bearer beam_your_api_key_here\""
    - code [ref=e27]: "{ \"range\": \"7d\", \"pageviews\": 842, \"uniqueVisitors\": 311, \"topPages\": [{ \"path\": \"/\", \"visitors\": 220, \"pageviews\": 415 }], \"topReferrers\": [{ \"source\": \"google.com\", \"visitors\": 137 }], \"topCountries\": [{ \"country\": \"US\", \"visitors\": 182 }], \"channels\": { \"Search\": { \"visitors\": 137, \"pageviews\": 241 }, \"Direct\": { \"visitors\": 98, \"pageviews\": 190 } } }"
  - generic [ref=e28]:
    - heading "GET /api/v1/sites/:id/events?range=7d|30d|today" [level=2] [ref=e29]
    - paragraph [ref=e30]: Returns custom event counts with property breakdowns.
    - code [ref=e32]: "curl -s \"https://beam-privacy.com/api/v1/sites/site_123/events?range=7d\" \\ -H \"Authorization: Bearer beam_your_api_key_here\""
    - code [ref=e34]: "{ \"range\": \"7d\", \"events\": [ { \"name\": \"signup_click\", \"count\": 24, \"properties\": { \"plan\": { \"pro\": 11, \"free\": 13 }, \"source\": { \"pricing\": 20 } } } ] }"
