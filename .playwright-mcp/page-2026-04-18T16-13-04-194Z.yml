      - heading "Frequently asked questions" [level=2] [ref=e123]
      - generic [ref=e124]:
        - generic [ref=e125]:
          - heading "Is there a free trial?" [level=3] [ref=e126]
          - paragraph [ref=e127]: No trial needed — the free plan is free forever, no time limit. Sign up, add your script, and start seeing data immediately. Upgrade to Pro whenever you need more sites or higher pageview limits. No commitment, no credit card for the free tier.
        - generic [ref=e128]:
          - heading "What happens when I hit the pageview limit?" [level=3] [ref=e129]
          - paragraph [ref=e130]: We'll continue collecting data and notify you when you're approaching your limit. We won't cut you off mid-month without warning. If you consistently exceed your limit, we'll ask you to upgrade. We believe in fair, transparent enforcement — not surprise billing.
        - generic [ref=e131]:
          - heading "Can I cancel anytime?" [level=3] [ref=e132]
          - paragraph [ref=e133]: Yes, absolutely. Cancel from your dashboard settings at any time with one click. Your Pro access continues until the end of the billing period, and you'll automatically move back to the free plan after that. No cancellation fees, no questions asked.
        - generic [ref=e134]:
          - heading "Is a credit card required for the free plan?" [level=3] [ref=e135]
          - paragraph [ref=e136]: No. Sign up with just your email address. No credit card, no payment info required to use the free plan. We only ask for payment details when you upgrade to Pro.
        - generic [ref=e137]:
          - heading "How does Beam compare to Plausible and Fathom?" [level=3] [ref=e138]
          - paragraph [ref=e139]:
            - text: Plausible starts at $9/month; Fathom starts at $15/month. Beam offers the same cookie-free, GDPR-compliant approach at $5/month — and a generous free tier they don't offer. See our
            - link "Plausible comparison" [ref=e140] [cursor=pointer]:
              - /url: /vs/plausible
            - text: and
            - link "Fathom comparison" [ref=e141] [cursor=pointer]:
              - /url: /vs/fathom
            - text: for a full breakdown.
        - generic [ref=e142]:
          - heading "Do you offer refunds?" [level=3] [ref=e143]
          - paragraph [ref=e144]:
            - text: If you're not happy with Beam within the first 30 days of your Pro subscription, contact us at
            - link "ralph@keylightdigital.dev" [ref=e145] [cursor=pointer]:
              - /url: mailto:ralph@keylightdigital.dev
            - text: and we'll issue a full refund, no questions asked.
