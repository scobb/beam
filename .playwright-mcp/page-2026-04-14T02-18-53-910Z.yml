    - heading "About Beam" [level=1] [ref=e9]
    - generic [ref=e10]:
      - paragraph [ref=e11]: Beam is a privacy-first web analytics service built on Cloudflare's global edge network. It gives site owners the traffic data they need — pageviews, referrers, top pages, countries, browsers, and devices — without using cookies, storing personal data, or requiring a consent banner. The tracking script is under 2KB, loads asynchronously, and never slows down your site.
      - paragraph [ref=e12]: We built Beam because most analytics tools force a trade-off between useful data and visitor privacy. Google Analytics shares your visitors' data with Google's advertising infrastructure. Privacy-focused alternatives like Plausible and Fathom are good products but can be expensive for smaller sites and indie developers. Beam offers the same cookie-free, GDPR-compliant approach starting completely free, with a Pro plan at $5/month.
      - paragraph [ref=e13]:
        - text: Beam is operated by
        - strong [ref=e14]: Keylight Digital LLC
        - text: ", a software company focused on building useful, privacy-respecting products. If you have questions, feedback, or need support, reach us at"
