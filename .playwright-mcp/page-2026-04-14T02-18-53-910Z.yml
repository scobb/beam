          - generic [ref=e99]: Beam is a lightweight, cookie-free web analytics service. It collects pageviews, referrers, countries, and device data without cookies or personal data — no consent banner needed. GDPR-compliant out of the box, under 2KB script, real-time dashboard. Free tier available. Pro plan at $5/month. Built on Cloudflare's edge by Keylight Digital LLC.
        - generic [ref=e100]:
          - heading "150-Word Blurb" [level=3] [ref=e101]
          - generic [ref=e102]:
            - text: Beam is a privacy-first web analytics service that gives site owners the traffic data they need without compromising visitor privacy. Unlike Google Analytics, Beam uses no cookies and sends no data to third parties — making it GDPR, CCPA, and PECR compliant out of the box, with no consent banner required.
            - text: "The tracking script is under 2KB, loads asynchronously, and collects pageviews, referrers, top pages, country, device type, and browser — the metrics that actually matter. The dashboard is clean and focused: no complex event models or steep learning curves."
            - text: "Beam is built on Cloudflare's global edge network, giving it fast data collection worldwide and high availability. It's competitively priced: a free tier covering 1 site and 50,000 pageviews/month, with a Pro plan at $5/month for unlimited sites and 500,000 pageviews. A privacy-respecting alternative to Google Analytics, Plausible, and Fathom."
