    - generic [ref=e67]:
      - paragraph [ref=e68]: Google Analytics 4 is powerful, but that power comes at a cost. Every pageview your visitors generate is sent to Google's servers, where it feeds into their advertising infrastructure. Even with IP anonymization enabled, GA4 still requires a cookie consent banner in the EU under GDPR — meaning a significant share of your visitors will opt out and disappear from your data.
      - paragraph [ref=e69]: Beam takes the opposite approach. The tracking script collects only what you need — page paths, referrers, country, device type, and browser — without any cookies or persistent identifiers. There's no PII involved, so no consent banner is required anywhere in the world. Your analytics data stays on Cloudflare's infrastructure and is never shared with third parties.
      - paragraph [ref=e70]: For most site owners, Google Analytics offers far more complexity than they need. Beam's dashboard surfaces the metrics that actually matter — visitors, pageviews, top pages, referrers, and geographic breakdown — in a clean interface you can understand at a glance. If you're tired of wrestling with GA4's event model or worried about privacy compliance, Beam is a straightforward drop-in replacement.
